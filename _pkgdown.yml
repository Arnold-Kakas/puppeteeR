url: https://arnold-kakas.github.io/puppeteeR/

template:
  bootstrap: 5
  bootswatch: cosmo

home:
  title: "puppeteeR — LLM Multi-Agent Orchestrator for R"
  description: >
    Graph-based workflows for orchestrating multiple LLM agents with different
    roles, tools, and providers. Built on ellmer.

navbar:
  structure:
    left:  [intro, articles, reference]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    articles:
      text: Articles
      menu:
        - text: Getting Started
          href: articles/getting-started.html
        - text: "---"
        - text: Graphs & Agents
        - text: Building Custom Graphs
          href: articles/custom-graphs.html
        - text: Convenience Workflows
          href: articles/workflows.html
        - text: "---"
        - text: Operations
        - text: Checkpointing & Human-in-the-Loop
          href: articles/checkpointing.html
        - text: Visualizing Graphs
          href: articles/visualization.html

reference:
  - title: "State"
    desc: "Define and manage shared workflow state."
    contents:
      - WorkflowState
      - workflow_state
      - reducer_overwrite
      - reducer_append
      - reducer_merge

  - title: "Graph building"
    desc: "Construct directed graphs of node functions."
    contents:
      - StateGraph
      - state_graph
      - add_node
      - add_edge
      - add_conditional_edge
      - compile
      - START
      - END

  - title: "Execution"
    desc: "Run and stream compiled graphs."
    contents:
      - GraphRunner

  - title: "Agents"
    desc: "Wrap ellmer Chat objects with identity and cost tracking."
    contents:
      - Agent
      - agent

  - title: "Convenience workflows"
    desc: "One-liner constructors for common patterns."
    contents:
      - sequential_workflow
      - supervisor_workflow
      - debate_workflow

  - title: "Termination conditions"
    desc: "Control when execution stops. Compose with `|` and `&`."
    contents:
      - max_turns
      - cost_limit
      - text_match
      - custom_condition
      - check_termination

  - title: "Checkpointing"
    desc: "Persist and resume workflow state."
    contents:
      - Checkpointer
      - MemoryCheckpointer
      - RDSCheckpointer
      - SQLiteCheckpointer
      - memory_checkpointer
      - rds_checkpointer
      - sqlite_checkpointer

  - title: "Visualization"
    desc: "Render graph diagrams."
    contents:
      - starts_with("visualize")
